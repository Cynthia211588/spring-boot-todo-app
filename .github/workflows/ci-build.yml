name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build with Maven
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: spring-boot-todo-app/pom.xml

      - name: Build artifact
        run: mvn -B -ntp clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: spring-boot-todo-app/target/*.jar

  test:
    name: Test with Maven
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: spring-boot-todo-app/pom.xml

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: spring-boot-todo-app/target/surefire-reports/*.xml

  docker-deploy:
    name: Build and Deploy Docker Image
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: spring-boot-todo-app/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./spring-boot-todo-app
          file: ./spring-boot-todo-app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-todo-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-todo-app:${{ github.sha }}

