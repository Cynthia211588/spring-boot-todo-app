name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build and Test with Maven
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: spring-boot-todo-app/pom.xml

      - name: Run unit tests
        run: mvn -B -ntp clean test

      - name: Build artifact
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: spring-boot-todo-app/target/surefire-reports/*.xml

