name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: spring-boot-todo-app/pom.xml

      - name: Build artifact
        run: mvn -B -ntp -DskipTests package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: spring-boot-todo-app/target/spring-boot-todo-app-0.0.1-SNAPSHOT.jar

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: spring-boot-todo-app/pom.xml

      - name: Run unit tests
        run: mvn -B -ntp clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: spring-boot-todo-app/target/surefire-reports/*.xml

  deploy:
    name: Deploy to Docker
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: spring-boot-todo-app/target

      - name: Build Docker image
        run: docker build -f Dockerfile -t spring-boot-todo-app:ci .

