name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build with Maven (tests included)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring-boot-todo-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: spring-boot-todo-app/pom.xml

      - name: Build project with Maven
        run: mvn -B clean package

