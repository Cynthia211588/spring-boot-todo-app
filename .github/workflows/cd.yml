name: CI/CD Pipeline

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build project
        working-directory: spring-boot-todo-app
        run: mvn -B clean package -DskipTests

      - name: Run tests
        working-directory: spring-boot-todo-app
        run: mvn -B test

      - name: Login to DockerHub
        run: |
          docker login -u ${{ secrets.DOCKERHUB_USERNAME }} \
                       -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -f spring-boot-todo-app/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-todo-app:latest spring-boot-todo-app

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-todo-app:latest